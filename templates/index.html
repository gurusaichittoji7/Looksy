<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Looksy 🔍</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        h1 { color: #e94560; font-size: 3rem; }
        input[type="text"] {
            width: 500px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            margin-right: 10px;
        }
        button {
            padding: 12px 24px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .result {
            margin-top: 30px;
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            max-width: 700px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>Looksy 🔍</h1>
    <p>AI-powered search agent</p>
    <form method="POST">
        <input type="text" name="query" placeholder="Search anything..." value="{{ query or '' }}">
        <button type="submit">Search</button>
    </form>
    {% if result %}
    <div class="result">
        <strong>Results for "{{ query }}":</strong>
        <p>{{ result }}</p>
    </div>
    {% endif %}
</body>
</html>
